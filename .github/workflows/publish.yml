name: Publish

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO }}
        run: |
          version() {
            cargo metadata --no-deps --format-version 1 \
              | jq -r ".packages[] | select(.name == \"$1\") | .version"
          }

          # Tag must match the crate it releases.
          TAG_VERSION=${GITHUB_REF_NAME#v}
          if [ "$TAG_VERSION" != "$(version archive-it-client)" ]; then
            echo "Tag ($TAG_VERSION) does not match archive-it-client version"
            exit 1
          fi

          # http-ferry is versioned independently of the release tag. When its
          # current version is already on crates.io, publish only the client;
          # otherwise publish the whole workspace, which orders the dependency
          # (http-ferry) ahead of archive-it-client automatically.
          HF_VERSION=$(version http-ferry)
          if curl -sf -o /dev/null \
            -H 'User-Agent: archive-it-client release workflow' \
            "https://crates.io/api/v1/crates/http-ferry/$HF_VERSION"; then
            echo "http-ferry $HF_VERSION already published; publishing client only."
            cargo publish --locked --package archive-it-client
          else
            cargo publish --locked --workspace
          fi
